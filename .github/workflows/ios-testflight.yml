name: iOS TestFlight Build

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'TestFlight release note'
        required: false
        default: 'New build from GitHub Actions'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Create Gemfile if missing
        working-directory: ios/App
        run: |
          if [ ! -f Gemfile ]; then
            echo 'source "https://rubygems.org"' > Gemfile
            echo 'gem "fastlane"' >> Gemfile
          fi
          bundle install

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build and upload to TestFlight
        working-directory: ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta

      - name: Verify HealthKit entitlement in archive
        working-directory: ios/App
        run: |
          echo "=== Verifying HealthKit entitlement in built app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/Archives -name "*.app" -path "*/Products/Applications/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.ipa" | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p /tmp/ipa_check
              unzip -o "$APP_PATH" -d /tmp/ipa_check
              APP_PATH=$(find /tmp/ipa_check -name "*.app" | head -1)
            fi
          fi

          if [ -z "$APP_PATH" ]; then
            echo "⚠️  Could not find .app to verify entitlements (build may have already uploaded)"
            exit 0
          fi

          echo "App path: $APP_PATH"
          ENTITLEMENTS=$(codesign -d --entitlements - "$APP_PATH" 2>/dev/null || true)
          echo "$ENTITLEMENTS"

          if echo "$ENTITLEMENTS" | grep -q "com.apple.developer.healthkit"; then
            echo "✅ HealthKit entitlement FOUND in signed binary"
          else
            echo "❌ HealthKit entitlement MISSING from signed binary!"
            exit 1
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/App/fastlane/report.xml
            ios/App/build/
          retention-days: 7
